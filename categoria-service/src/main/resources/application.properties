spring.application.name=categoria-service
server.port=8087

#url de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_categoria?createDatabaseIfNotExist=true&serverTimezone=UTC

#usuario de la BD
spring.datasource.username=root

#contraseña (vacia)
spring.datasource.password=

#driver mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#desactiva liquibase (no se usa migraciones)
spring.liquibase.enabled=false

#crea/actualiza tablas automaticamente al iniciar
spring.jpa.hibernate.ddl-auto=update

#smuestra las consultas SQL en la terminal
spring.jpa.show-sql=true