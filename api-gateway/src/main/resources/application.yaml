server:
  port: 8080

error:
  include-message: always
  include-binding-errors: always

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: cliente-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/clientes/**
        - id: producto-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**
        - id: inventario-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/inventarios/**
        - id: pedido-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/pedidos/**
        - id: pago-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/pagos/**